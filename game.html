            { id: '偷梁换柱', name: '偷梁换柱', type: 'instant', cost: 2, dur: 'turn', icon: '🎪', desc: '双方回合开始或结束前均可。指定任意一方1枚已揭开的五行棋子，附加一个临时额外属性。本回合吃子对抗中，优先且强制使用此额外属性计算相生相克。可强化己方克制/陷害敌方被反克。' },
            { id: '聚散浮沉', name: '聚散浮沉', type: 'instant', cost: 4, dur: 'turn', icon: '💎', desc: '双方回合开始或结束前均可。二选一：①聚（强化己方）：指定己方1枚已揭开五行棋，本回合基础内气临时+2。②散（削弱敌方）：指定敌方1枚已揭开五行棋，本回合基础内气临时-2（内气≤0时极易被吃）。' },
            { id: '含沙射影', name: '含沙射影', type: 'instant', cost: 2, dur: 'turn', icon: '🗡️', desc: '双方回合开始或结束前均可。秘密指定己方1枚棋子附上暗记（对敌方完全隐藏）。当该棋子被敌方任意五行棋吃掉时，陷阱触发：吃掉它的敌方棋子基础内气永久减2（可减至0，极度残废）。' },
        ];

        let cardState = {
            black: { deck: [], hand: [], graveyard: [], field: [] },
            white: { deck: [], hand: [], graveyard: [], field: [] }
        };
        let selectedCard = null; // { color, index }

        const CARDS_REQUIRE_TARGET = [
            '无坚不摧', '星火燎原', '移花接木', '行云流水', '缩地成寸',
            '借尸还魂', '偷天换日', '颠倒乾坤', '此消彼长',
            '画地为牢', '偷梁换柱', '聚散浮沉', '含沙射影'
        ];

        async function invokeSelectedCard() {
            if (!selectedCard) return;
            const card = cardState[selectedCard.color].hand[selectedCard.index];
            if (!card) return;

            // 时机校验：暗度陈仓 & 斗转星移 只能在未行棋前使用
            if (card.id === '暗度陈仓' && actionDoneThisTurn) {
                alert('「暗度陈仓」必须在本回合行棋前使用！');
                return;
            }
            if (card.id === '斗转星移' && (cardsPlayedThisTurn > 0 || actionDoneThisTurn)) {
                alert('「斗转星移」必须在本回合行棋前且为本回合第一个动作！');
                return;
            }

            if (CARDS_REQUIRE_TARGET.includes(card.id)) {
                // 需要目标，引流到棋盘点击
                const info = document.getElementById('card-action-info');
                info.textContent = `【待点选目标】已准备发动「${card.name}」，请直接在上方棋盘点击目标所在格子！`;
                info.style.color = '#ffca28';
                return; // 重要修复：拦截掉后续执行，等待玩家点击棋盘调用 selectIntersection
            }

            let options = {};
            // 不需要点场上目标，全场生效/抽牌卡等
            if (card.id === '无中生有') {
                const costStr = prompt(`请输入要消耗的内气值(1~3)用于「无中生有」抽/弃牌数：`, "2");
                if (costStr === null) return;
                const cVal = parseInt(costStr);
                if (isNaN(cVal) || cVal < 1 || cVal > 3) {
                    alert("输入无效，必须是1~3之间的整数！"); return;
                }
                if (playerVitality[selectedCard.color] < cVal) {
                    alert("内气不足！"); return;
                }
                options.wzsyCost = cVal;
            } else {
                if (!confirm(`确定要直接点燃气血，发动无目标卡牌「${card.name}」吗？`)) return;
            }

            await useSelectedCard(null, options);
        }

        function shuffleArr(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function initCardDecks() {
            // 每种卡牌仅限1张，共28张；双方牌组内容相同，各自独立洗牌
            const makeDeck = () => shuffleArr([...CARD_DATA]);
            for (const c of ['black', 'white']) {
                cardState[c] = { deck: makeDeck(), hand: [], graveyard: [], field: [] };
            }
            // 初始各抽5张
            for (let i = 0; i < 5; i++) { drawCard('black'); drawCard('white'); }
            renderCardZones();
        }

        function drawCard(color) {
            if (cardState[color].deck.length === 0) return null;
            const card = cardState[color].deck.shift();
            cardState[color].hand.push(card);
            return card;
        }

        /**
         * 判断某张卡是否"当前可激活"（用于高亮显示）
         */
        function isCardActivatable(card, color) {
            // 基础限制1：气值是否足够
            if (playerVitality[color] < card.cost) return false;

            const opp = color === 'black' ? 'white' : 'black';
            const isMyTurn = (color === currentPlayer);

            // 基础限制2：Active 卡只能在自己回合发动
            if (card.type === 'active' && !isMyTurn) return false;

            // ── A. 反制卡（Counter） ──
            if (card.type === 'counter') {
                // 判断是否在吃子连锁窗口期间
                if (!counterWindowOpen || !counterWindowEvent) return false;
                const ev = counterWindowEvent;
                if (ev.defenderColor !== color) return false; // 必须是我方被吃
                
                if (card.id === '偷天换日') {
                    // 需要被吃的是五行棋，且场上有至少2枚己方棋子才能互换
                    if (ev.defenderType === 'yin' || ev.defenderType === 'yang') return false;
                    let count = 0;
                    for (const row of grid) for (const p of row) if (p && p.color === color) { count++; if (count >= 2) return true; }
                    return false;
                }
                if (card.id === '玉石俱焚') return ev.attackerType === ev.defenderType;
                if (card.id === '生生不息') return GENERA[ev.defenderType] === ev.attackerType;
                if (card.id === '以柔克刚') return ev.diffDamage > 0;
                if (card.id === '枯木逢春' || card.id === '遗泽后世') return true;
                return false;
            }

            // ── B. 徒劳无功（Instant 连锁对方卡牌） ──
            // 这是用来阻挡对方卡牌的，目前自己回合面板不该主动亮起（依赖 waitForOpponentResponse 被动连锁）
            if (card.id === '徒劳无功') return false;

            // ── C. 时机限制与目标限制（Active / Instant） ──
            
            // 1) "仅限己方回合开始/未行棋时"：暗度陈仓、斗转星移、噤若寒蝉
            if (['暗度陈仓', '斗转星移', '噤若寒蝉'].includes(card.id)) {
                if (!isMyTurn || actionDoneThisTurn) return false;
                if (card.id === '斗转星移' && (cardsPlayedThisTurn > 0 || cardState[color].hand.length < 2)) return false;
                return true;
            }

            // 2) "本回合己方吃子后"：乘胜追击、以战养战
            if (['乘胜追击', '以战养战'].includes(card.id)) {
                if (!isMyTurn) return false;
                if (card.id === '乘胜追击') {
                    return thisTurnCaptureEvents.some(e => e.attackerColor === color && OVERCOMES[e.attackerType] === e.defenderType);
                }
                if (card.id === '以战养战') {
                    return thisTurnCaptureEvents.some(e => e.attackerColor === color);
                }
            }

            // 3) 五行专属强化卡：己方需有对应五行且已揭开的棋子在场
            const elemReq = { '无坚不摧': 'metal', '星火燎原': 'fire', '移花接木': 'wood', '行云流水': 'water', '缩地成寸': 'earth' };
            if (elemReq[card.id]) {
                const reqType = elemReq[card.id];
                return grid.some(row => row.some(p => p && p.color === color && p.type === reqType && p.isRevealed));
            }

            // 4) 目标必须是【敌方已揭开五行棋子】：画地为牢、聚散浮沉(敌方)
            // 聚散浮沉可指自己也可指敌方，所以下放至"任意"
            if (card.id === '画地为牢') {
                return grid.some(row => row.some(p => p && p.color === opp && p.isRevealed && p.type !== 'yin' && p.type !== 'yang'));
            }

            // 5) 目标必须是【任意已揭开五行棋子】：偷梁换柱、聚散浮沉
            if (card.id === '偷梁换柱' || card.id === '聚散浮沉') {
                return grid.some(row => row.some(p => p && p.isRevealed && p.type !== 'yin' && p.type !== 'yang'));
            }

            // 6) 借尸还魂：需献祭己方阴阳棋 + 墓地需有本方死亡棋子
            if (card.id === '借尸还魂') {
                const hasDead = deadPieces[color].length > 0;
                const hasYY = grid.some(row => row.some(p => p && p.color === color && (p.type === 'yin' || p.type === 'yang')));
                return hasDead && hasYY;
            }

            // 7) 含沙射影：需要暗记己方任意棋子
            if (card.id === '含沙射影') {
                return grid.some(row => row.some(p => p && p.color === color));
            }

            // 8) 探囊取物：己方牌库有牌
            if (card.id === '探囊取物') {
                if (!isMyTurn) return false;
                return cardState[color].deck.length > 0;
            }

            // 9) 颠倒乾坤：指定己方阴阳棋子
            if (card.id === '颠倒乾坤') {
                return grid.some(row => row.some(p => p && p.color === color && (p.type === 'yin' || p.type === 'yang')));
            }

            // 10) 此消彼长：指定任意阴阳棋子
            if (card.id === '此消彼长') {
                return grid.some(row => row.some(p => p && (p.type === 'yin' || p.type === 'yang')));
            }

            // 其余无特殊盘面目标限制的卡牌：无中生有、登峰造极、破釜沉舟
            if (['无中生有', '破釜沉舟', '登峰造极'].includes(card.id)) {
                return true; 
            }

            return false;
        }

        function renderCardZones() {
            for (const color of ['black', 'white']) {
                const cs = cardState[color];
                // 牌库 / 墓地 计数
                const de = document.getElementById(`deck-count-${color}`);
                if (de) de.textContent = cs.deck.length;
                const ge = document.getElementById(`grave-count-${color}`);
                if (ge) ge.textContent = cs.graveyard.length;

                // 手牌区
                const handEl = document.getElementById(`hand-${color}`);
                if (!handEl) continue;
                handEl.innerHTML = '';
                // 判断是否为自己的牌（联网时只有myRole能看正面，本地模式两方都正面）
                const showFace = !myRoom || color === myRole;
                cs.hand.forEach((card, idx) => {
                    if (!showFace) {
                        const back = document.createElement('div');
                        back.className = 'hand-card-back';
                        back.title = '对手手牌';
                        handEl.appendChild(back);
                    } else {
                        const el = document.createElement('div');
                        const isActivatable = color === currentPlayer && isCardActivatable(card, color);
                        el.className = `hand-card card-${card.type}${isActivatable ? ' card-activatable' : ''}`;
                        if (selectedCard && selectedCard.color === color && selectedCard.index === idx) {
                            el.classList.add('selected-card');
                            const invokeBtn = document.createElement('button');
                            invokeBtn.className = 'invoke-btn';
                            invokeBtn.textContent = '发动';
                            invokeBtn.onclick = (e) => { e.stopPropagation(); invokeSelectedCard(); };
                            el.appendChild(invokeBtn);
                        }
                        el.title = `${card.name}：${card.desc}`;

                        const costEl = document.createElement('div');
                        costEl.className = 'hand-card-cost';
                        costEl.textContent = card.cost;

                        const iconEl = document.createElement('div');
                        iconEl.className = 'hand-card-icon';
                        iconEl.textContent = card.icon;

                        const nameEl = document.createElement('div');
                        nameEl.className = 'hand-card-name';
                        nameEl.textContent = card.name;

                        const subEl = document.createElement('div');
                        subEl.className = 'hand-card-subtype';
                        subEl.textContent = card.type === 'active' ? '主动' : card.type === 'counter' ? '反制' : '即时';

                        const descEl = document.createElement('div');
                        descEl.className = 'hand-card-desc';
                        descEl.textContent = card.desc;

                        const zoomBtn = document.createElement('button');
                        zoomBtn.className = 'card-zoom-btn';
                        zoomBtn.textContent = '🔍';
                        zoomBtn.title = '点击放大查看详情';
                        zoomBtn.onclick = (e) => { e.stopPropagation(); openCardZoom(card); };

                        el.appendChild(costEl);
                        el.appendChild(iconEl);
                        el.appendChild(nameEl);
                        el.appendChild(subEl);
                        el.appendChild(descEl);
                        el.appendChild(zoomBtn);
                        el.onclick = () => selectCard(color, idx);
                        handEl.appendChild(el);
                    }
                });

                // 效果区
                const fieldEl = document.getElementById(`field-${color}`);
                if (!fieldEl) continue;
                const label = color === 'black' ? '黑方效果区' : '白方效果区';
                fieldEl.innerHTML = `<span class="zone-field-label">${label}</span>`;
                if (cs.field.length === 0) {
                    fieldEl.innerHTML += '<span class="zone-field-empty">— 无持续效果 —</span>';
                } else {
                    cs.field.forEach(card => {
                        const fc = document.createElement('div');
                        fc.className = `field-card card-${card.type}`;
                        fc.innerHTML = `
                            <div class="fc-cost">${card.cost}</div>
                            <div class="fc-icon">${card.icon}</div>
                            <div class="fc-info">
                                <div class="fc-name">${card.name}</div>
                                <div class="fc-desc">${card.desc}</div>
                            </div>
                        `;
                        // Hover时可以提供完整的放大提示
                        fc.title = `【${card.name}】耗气:${card.cost}\n${card.desc}\n\n(点击可放大查看)`;
                        fc.onclick = (e) => { e.stopPropagation(); openCardZoom(card); };
                        fieldEl.appendChild(fc);
                    });
                }
            }
        }

        function selectCard(color, idx) {
            if (myRoom && color !== myRole) return;
            if (color !== currentPlayer) {
                document.getElementById('info').textContent = '现在不是你的回合！';
                return;
            }
            // 噤若寒蝉封禁检查：对方的 field 是否有噤若寒蝉卡
            const oppColorSc = color === 'black' ? 'white' : 'black';
            if (cardState[oppColorSc].field.some(c => c.id === '噤若寒蝉')) {
                document.getElementById('info').textContent = '对方「噤若寒蝉」封印尚在生效！本回合无法发动任何卡牌！';
                return;
            }

            const card = cardState[color].hand[idx];
            // 反制卡提示：通常在敌方吃子后自动弹出，如果手动选中，给出提示
            if (card && card.type === 'counter') {
                const useNow = confirm(`【反制卡】「${card.name}」通常在敌方吃子后的连锁窗口自动弹出。\n\n` +
                    `您现在主动点击，是否直接发动？\n` +
                    `确定 = 立即发动（需符合触发条件）\n取消 = 取消选牌`);
                if (!useNow) { cancelCardSelection(); return; }
                // 允许继续
            }

            // 点同一张取消
            if (selectedCard && selectedCard.color === color && selectedCard.index === idx) {
                cancelCardSelection(); return;
            }
            selectedCard = { color, index: idx };
            selectedPos = null; selectedReserve = null;
            renderReserves();
            const info = document.getElementById('card-action-info');
            info.style.color = '';
            const reqStr = CARDS_REQUIRE_TARGET.includes(card.id) ? '需要点击棋盘目标' : '全场直接生效';
            info.textContent = `已选「${card.name}」(耗${card.cost}气)[${reqStr}] | 请点击卡牌上方【发动】按钮`;
            info.className = 'card-action-info visible';
            renderCardZones();
            renderBoard();
        }

        function cancelCardSelection() {
            selectedCard = null;
            const info = document.getElementById('card-action-info');
            info.className = 'card-action-info';
            info.style.color = '';
            renderCardZones();
        }

        /**
         * 连锁响应窗口：在发动卡牌效果结算前，给对方一次以「徒劳无功」连锁无效化的机会。
         * @param {Object} activatedCard - 刚发动的卡牌对象
         * @param {string} activatingColor - 发动方颜色
         * @returns {Promise<boolean>} true = 被无效化，false = 正常结算
         */
        /**
         * 弹出「徒劳无功」连锁无效化窗口（占位：对方发牌时）
         * @param {Object} activatedCard - 刚发动的卡牌对象
         * @param {string} activatingColor - 发动方额色
         * @returns {Promise<boolean>} true = 被无效化，false = 正常结算
         */

        /**
         * 吃子弹出的反制卡连锁响应窗口
         * 在敌方吃子后，给防守方一次发动 counter 卡的机会。
         * @param {Object} captureEvent - 吃子事件对象
         * @param {string} attackerColor - 吃子方颜色（进攻方）
         */
        async function waitForCounterResponse(captureEvent, attackerColor) {
            const defColor = captureEvent.defenderColor; // 防守方（将要用反制卡的一方）
            const hand = cardState[defColor].hand;

            // 过滤出手牌中可用的 counter 卡（类型为 counter，且气值充足，且触发条件匹配）
            const usableCounters = hand
                .map((c, idx) => ({ card: c, idx }))
                .filter(({ card }) => {
                    if (card.type !== 'counter') return false;
                    if (playerVitality[defColor] < card.cost) return false;
                    const ev = captureEvent;
                    if (card.id === '玉石俱焚') return ev.attackerColor !== defColor && ev.defenderColor === defColor && ev.attackerType === ev.defenderType;
                    if (card.id === '生生不息') return ev.attackerColor !== defColor && ev.defenderColor === defColor && GENERA[ev.defenderType] === ev.attackerType;
                    if (card.id === '以柔克刚') return ev.attackerColor !== defColor && ev.defenderColor === defColor && ev.diffDamage > 0;
                    if (card.id === '枯木逢春') return ev.attackerColor !== defColor && ev.defenderColor === defColor;
                    if (card.id === '遗泽后世') return ev.attackerColor !== defColor && ev.defenderColor === defColor;
                    if (card.id === '偷天换日') {
                        if (ev.attackerColor === defColor || ev.defenderColor !== defColor) return false;
                        if (ev.defenderType === 'yin' || ev.defenderType === 'yang') return false;
                        let count = 0;
                        for (const row of grid) for (const p of row) if (p && p.color === defColor) { count++; if (count >= 2) return true; }
                        return false;
                    }
                    return false; // 其他 counter 卡不在吃子时弹窗
                });

            if (usableCounters.length === 0) return;

            const defLabel = defColor === 'black' ? '黑方' : '白方';
            const atkLabel = attackerColor === 'black' ? '黑方' : '白方';
            const capTypeDesc = captureEvent.attackerType === captureEvent.defenderType ? '同属性吃子' :
                OVERCOMES[captureEvent.attackerType] === captureEvent.defenderType ? '相克吃子' : '吃子';
            const capDesc = `${atkLabel}【${capTypeDesc}】吃掉了${defLabel}的${captureEvent.defenderType}棋`;

            const cardListText = usableCounters.map(({ card }) =>
                `• 「${card.name}」(${card.cost}气): ${card.desc.slice(0, 28)}...`
            ).join('\n');

            const wantsToCounter = confirm(
                `【⚡ 反制连锁窗口 ⚡】\n\n${capDesc}！\n\n${defLabel}持有以下可用反制卡：\n${cardListText}\n\n当前${defLabel}气值：${playerVitality[defColor]}\n\n确定(OK) = 打开反制卡选择界面\n取消(Cancel) = 放弃响应`
            );
            if (!wantsToCounter) return;

            // 开启连锁窗口标志，让反制卡高亮
            counterWindowOpen = true;
            counterWindowEvent = captureEvent;
            renderCardZones();

            // 弹出选卡界面
            const selected = await openCardSelectModal(
                `${defLabel} 反制响应`,
                `请选择你要发动的反制卡（可多选）`,
                usableCounters.map(({ card }) => card),
                -1, false
            );
            if (!selected || selected.length === 0) return;

            // 临时将吃子事件注入 prevTurnCaptureEvents，让卡牌效果校验通过
            const origPrev = prevTurnCaptureEvents;
            prevTurnCaptureEvents = [captureEvent];

            const origSelectedCard = selectedCard;

            // 遍历玩家多选的反制卡，逐个发动
            for (let selIdx of selected) {
                const chosenEntry = usableCounters[selIdx];
                if (!chosenEntry) continue;

                const cardToUse = chosenEntry.card;
                // 由于前面的卡牌发动会扣除手牌，此处必须重新查找该卡当前的索引
                const currentIdx = cardState[defColor].hand.indexOf(cardToUse);
                if (currentIdx !== -1) {
                    selectedCard = { color: defColor, index: currentIdx };
                    await useSelectedCard(null, {});
                }
            }

            selectedCard = origSelectedCard;
            prevTurnCaptureEvents = origPrev;

            // 关闭连锁窗口标志，消除反制卡高亮
            counterWindowOpen = false;
            counterWindowEvent = null;
            renderCardZones();
        }

        async function waitForOpponentResponse(activatedCard, activatingColor) {
            const oppColor = activatingColor === 'black' ? 'white' : 'black';
            const oppHand = cardState[oppColor].hand;

            // 检查对方是否持有「徒劳无功」且气值充足（3气）
            const tlwgIdx = oppHand.findIndex(c => c.id === '徒劳无功');
            if (tlwgIdx === -1) return false; // 对方没有连锁牌，直接结算

            const tlwgCard = oppHand[tlwgIdx];
            if (playerVitality[oppColor] < tlwgCard.cost) return false; // 气值不足

            const oppLabel = oppColor === 'black' ? '黑方' : '白方';
            const atkLabel = activatingColor === 'black' ? '黑方' : '白方';

            // 弹出响应窗口（本地模式）
            const wantsToCounter = confirm(
                `【⚡ 连锁响应窗口 ⚡】\n\n` +
                `${atkLabel}刚发动了「${activatedCard.name}」，效果尚未结算。\n\n` +
                `${oppLabel}手中持有：「徒劳无功」(耗 ${tlwgCard.cost} 气)\n` +
                `效果：使对方此卡完全失效，其气耗已被扣除不退还。\n你方额外支付 ${tlwgCard.cost} 气。\n\n` +
                `当前${oppLabel}气值：${playerVitality[oppColor]} 气\n\n` +
                `确定(OK) = 使用「徒劳无功」无效化\n取消(Cancel) = 放弃响应，对方效果正常结算`
            );

            if (!wantsToCounter) return false; // 放弃响应

            // 对方扣除「徒劳无功」的费用
            playerVitality[oppColor] -= tlwgCard.cost;
            oppHand.splice(tlwgIdx, 1);
            cardState[oppColor].graveyard.push(tlwgCard);
            updateVitalityDisplay();
            renderCardZones();

            alert(`「徒劳无功」连锁成功！\n「${activatedCard.name}」效果被完全无效化，双方气耗均不退还。`);
            return true; // 被无效化
        }

        async function useSelectedCard(targetPos, options = {}) {
            const isRemote = options.isRemote || false;
            let color, index, card;

            if (isRemote) {
                color = options.color;
                index = cardState[color].hand.findIndex(c => c.id === options.cardId);
                if (index === -1) return false;
                card = cardState[color].hand[index];
            } else {
                if (!selectedCard) return false;
                color = selectedCard.color;
                index = selectedCard.index;
                card = cardState[color].hand[index];
            }
            if (!card) { if (!isRemote) cancelCardSelection(); return false; }

            // 目标合法性校验
            if (!isRemote && CARDS_REQUIRE_TARGET.includes(card.id)) {
                if (!targetPos) { alert("该卡牌需要选择一个目标！"); cancelCardSelection(); return false; }
                const targetPiece = grid[targetPos.r][targetPos.c];
                const elemBuffs = { '无坚不摧': 'metal', '星火燎原': 'fire', '移花接木': 'wood', '行云流水': 'water', '缩地成寸': 'earth' };
                if (elemBuffs[card.id]) {
                    if (!targetPiece || targetPiece.color !== color || !targetPiece.isRevealed || targetPiece.type !== elemBuffs[card.id]) {
                        alert(`「${card.name}」只能对己方已揭开的【${getSymbolByType(elemBuffs[card.id])}】棋使用！`);
                        cancelCardSelection(); return false;
                    }
                }
                // ===== 新卡牌目标合法性校验（扣费前验证，避免消耗卡后目标无效）=====
                const opp = color === 'black' ? 'white' : 'black';
                const isFiveElem = p => p && p.type !== 'yin' && p.type !== 'yang';
                const isYinYang = p => p && (p.type === 'yin' || p.type === 'yang');
                const targetValidation = {
                    '颠倒乾坤': () => isYinYang(targetPiece) && targetPiece.color === color,
                    '此消彼长': () => isYinYang(targetPiece),
                    '画地为牢': () => isFiveElem(targetPiece) && targetPiece.color === opp && targetPiece.isRevealed,
                    '偷梁换柱': () => isFiveElem(targetPiece) && targetPiece.isRevealed,
                    '聚散浮沉': () => isFiveElem(targetPiece) && targetPiece.isRevealed,
                    '含沙射影': () => targetPiece && targetPiece.color === color,
                    '借尸还魂': () => isYinYang(targetPiece) && targetPiece.color === color,
                };
                const errMsg = {
                    '颠倒乾坤': '请选择己方阴阳棋子！',
                    '此消彼长': '请选择棋盘上的阴阳棋子！',
                    '画地为牢': '请选择敌方已揭开的五行棋子！',
                    '偷梁换柱': '请选择已揭开的五行棋子！',
                    '聚散浮沉': '请选择已揭开的五行棋子（未揭开或阴阳棋无效）！',
                    '含沙射影': '请选择己方任意棋子！',
                    '借尸还魂': '请选择己方阴阳棋子作为献祭！',
                };
                if (targetValidation[card.id] && !targetValidation[card.id]()) {
                    alert(`「${card.name}」：目标不合法——${errMsg[card.id] || '请重新选择目标。'}`);
                    cancelCardSelection(); return false;
                }
            }


            let actualCost = card.cost;
            if (card.id === '无中生有') actualCost = options.wzsyCost || card.cost;

            // 破釜沉舟：当前玩家的 field 中有此卡时，卡高不即时扣除卿记账
            const hasPFCZ = !isRemote && card.id !== '破釜沉舟' && cardState[color].field.some(c => c.id === '破釜沉舟');
            if (hasPFCZ) {
                loanedCosts[color] += actualCost;
                actualCost = 0; // 本次免费
            }

            if (!isRemote && playerVitality[color] < actualCost) {
                alert(`气值不足！需要 ${actualCost} 点气`);
                if (!isRemote) cancelCardSelection(); return false;
            }
            playerVitality[color] -= actualCost;
            cardState[color].hand.splice(index, 1);

            if (card.dur === 'permanent' || card.dur === 'turn') {
                if (targetPos) card.targetRef = `${targetPos.r},${targetPos.c}`;
                cardState[color].field.push(card);
            } else {
                cardState[color].graveyard.push(card);
            }

            if (!isRemote) cancelCardSelection();
            updateVitalityDisplay();
            renderCardZones();

            // ===== 连锁响应窗口 =====
            // 非远端发动时，给对方一次机会以「徒劳无功」无效化本卡效果
            // 「徒劳无功」本身不触发响应窗口（避免无限递归）
            let negated = false;
            if (!isRemote && card.id !== '徒劳无功') {
                negated = await waitForOpponentResponse(card, color);
            }
            if (negated) {
                renderCardZones();
                renderBoard();
                cardsPlayedThisTurn++;
                return true; // 被无效化，不结算效果
            }

            // 核心效果结算 (异步)
            const generatedEffectPayload = await applyCardEffect(card, color, targetPos, isRemote ? options.effectPayload : null, options.wzsyCost);

            if (!isRemote && myRoom) {
                sendActionToServer('use_card', {
                    color: color,
                    cardId: card.id,
                    targetPos: targetPos,
                    effectPayload: generatedEffectPayload,
                    wzsyCost: options.wzsyCost
                });
            }

            renderBoard();
            updateVitalityDisplay();
            renderCardZones();
            cardsPlayedThisTurn++; // 本回合用牌计数 +1
            return true;
        }

        // 仅临时为 getSymbolByType 写一个短函数，之前的代码里可能有，但为了安全直接在这里用 switch
        function getSymbolByType(type) {
            const map = { metal: '金', wood: '木', water: '水', fire: '火', earth: '土', yin: '阴', yang: '阳' };
            return map[type] || '';
        }

        async function applyCardEffect(card, color, targetPos, remotePayload, wzsyCost) {
            const opp = color === 'black' ? 'white' : 'black';
            const targetPiece = targetPos ? grid[targetPos.r][targetPos.c] : null;

            // 1. 五行专属强化卡 (打通 Buff 赋予链路)
            const elemBuffs = ['无坚不摧', '星火燎原', '移花接木', '行云流水', '缩地成寸'];
            if (elemBuffs.includes(card.id) && targetPiece) {
                if (!targetPiece.buffs) targetPiece.buffs = [];
                if (!targetPiece.buffs.includes(card.id)) {
                    targetPiece.buffs.push(card.id);
                }
                console.log(`[卡牌发动] ${card.name} 赋予 ${targetPos.r},${targetPos.c}`);
                return null;
            }

            switch (card.id) {
                case '无中生有': {
                    const num = wzsyCost || 2;
                    for (let i = 0; i < num; i++) drawCard(color);
                    if (remotePayload && remotePayload.discardedIds) {
                        // 远端：用卡牌ID定位并移除
                        const hand = cardState[color].hand;
                        remotePayload.discardedIds.forEach(cid => {
                            const idx = hand.findIndex(c => c.id === cid);
                            if (idx !== -1) { const c = hand.splice(idx, 1)[0]; cardState[color].graveyard.push(c); }
                        });
                        return null;
                    } else {
                        const result = await forceDiscard(color, num);
                        return { discardedIds: result.ids || [] };
                    }
                }
                case '探囊取物': {
                    if (cardState[color].deck.length > 0) {
                        let chosenCardId;
                        if (remotePayload && remotePayload.chosenCardId !== undefined) {
                            chosenCardId = remotePayload.chosenCardId;
                        } else {
                            const sel = await openCardSelectModal('探囊取物：检索牌库', '请从牌库中选择 1 张加入手牌', cardState[color].deck, 1, false);
                            if (sel && sel.length > 0) chosenCardId = cardState[color].deck[sel[0]]?.id;
                        }
                        if (chosenCardId !== undefined) {
                            const deckIdx = cardState[color].deck.findIndex(c => c.id === chosenCardId);
                            if (deckIdx !== -1) {
                                const chosenCard = cardState[color].deck.splice(deckIdx, 1)[0];
                                cardState[color].hand.push(chosenCard);
                                if (!remotePayload) alert(`「探囊取物」：检索到「${chosenCard.name}」，已向对手展示。`);
                            }
                            cardState[color].deck = shuffleArr(cardState[color].deck); // 修复：保存洗牌后的返回值
                            return { chosenCardId };
                        }
                    } else {
                        if (!remotePayload) alert('牌库已空，无法检索。');
                    }
                    break;
                }
                case '遗泽后世': {
                    // 触发条件：上一回合对方吃掉了我方五行棋
                    const hasCapEvent = prevTurnCaptureEvents.some(e => e.attackerColor === opp && e.defenderColor === color);
                    if (!hasCapEvent && !remotePayload) {
                        playerVitality[color] += card.cost; updateVitalityDisplay();
                        const gi = cardState[color].graveyard.lastIndexOf(card);
                        if (gi !== -1) cardState[color].graveyard.splice(gi, 1);
                        cardState[color].hand.push(card);
                        alert('「遗泽后世」触发失败：上一回合对手未吃掉你的任何五行棋！');
                        return null;
                    }
                    drawCard(color);
                    checkHandLimit(color);
                    break;
                }
                case '生生不息': {
                    // 触发条件：上一回合对方用"被我方棋子所生的属性"吃掉了我方棋
                    const hasGenEvent = prevTurnCaptureEvents.some(e =>
                        e.attackerColor === opp && e.defenderColor === color &&
                        GENERA[e.defenderType] === e.attackerType // 如：木(被吃)生火(攻击方)
                    );
                    if (!hasGenEvent && !remotePayload) {
                        playerVitality[color] += card.cost; updateVitalityDisplay();
                        const gi = cardState[color].graveyard.lastIndexOf(card);
                        if (gi !== -1) cardState[color].graveyard.splice(gi, 1);
                        cardState[color].hand.push(card);
                        alert('「生生不息」触发失败：上一回合对手未用"被你生的属性"吃掉你的棋！');
                        return null;
                    }
                    playerVitality[color] = Math.min(50, playerVitality[color] + 2);
                    updateVitalityDisplay();
                    break;
                }
                case '登峰造极':
                    if (!window.globalBuffs) window.globalBuffs = {};
                    window.globalBuffs[color + '_baseEnergyBonus'] = (window.globalBuffs?.[color + '_baseEnergyBonus'] || 0) + 1;
                    alert('「登峰造极」：己方所有五行棋子基础内气永久+1，此后每吃掉一枚敌方五行棋回复2气！');
                    break;
                case '斗转星移': {
                    if (cardState[color].hand.length > 0) {
                        let washedIds;
                        if (remotePayload && remotePayload.washedIds) {
                            washedIds = remotePayload.washedIds;
                        } else {
                            const sel = await openCardSelectModal('斗转星移：手牌调度', '请选择任意数量卡牌洗回牌库，将抽取等量新牌', cardState[color].hand, -1, false);
                            if (sel && sel.length > 0) {
                                washedIds = sel.map(idx => cardState[color].hand[idx]?.id).filter(Boolean);
                            }
                        }
                        if (washedIds && washedIds.length > 0) {
                            actionBlockedThisTurn = true;
                            washedIds.forEach(cid => {
                                const idx = cardState[color].hand.findIndex(c => c.id === cid);
                                if (idx !== -1) { const c = cardState[color].hand.splice(idx, 1)[0]; cardState[color].deck.push(c); }
                            });
                            cardState[color].deck = shuffleArr(cardState[color].deck); // 修复：保存洗牌返回值
                            for (let i = 0; i < washedIds.length; i++) drawCard(color);
                            return { washedIds };
                        }
                    }
                    break;
                }
                case '暗度陈仓':
                    if (cardState[opp].hand.length > 0) {
                        let selIdx;
                        if (remotePayload && remotePayload.selectedOppHandIdx !== undefined) {
                            selIdx = remotePayload.selectedOppHandIdx;
                        } else {
                            const sel = await openCardSelectModal('暗度陈仓：盲打敌方手牌', '请选择 1 张敌方手牌进行弃置（盲选，你无法看到牌面）', cardState[opp].hand, 1, true);
                            if (sel && sel.length > 0) selIdx = sel[0];
                        }
                        if (selIdx !== undefined) {
                            actionBlockedThisTurn = true;
                            const discardedCard = cardState[opp].hand.splice(selIdx, 1)[0];
                            cardState[opp].graveyard.push(discardedCard);
                            if (!remotePayload) alert(`你成功弃置了敌方的「${discardedCard.name}」！`);
                            return { selectedOppHandIdx: selIdx };
                        }
                    } else {
                        if (!remotePayload) alert("敌方暂无手牌可以弃置。");
                    }
                    break;
                // ===== 新卡牌效果 =====
                case '乘胜追击': {
                    // dur 已是 'turn'，useSelectedCard 会自动将其推入 field
                    alert('「乘胜追击」已启动：本回合相克吃子后可获额外一次行动！');
                    break;
                }
                case '以战养战': {
                    // dur 已是 'turn'，useSelectedCard 会自动将其推入 field
                    alert('「以战养战」已就位：本回合满足条件的吃子将自动回复气血！');
                    break;
                }
                case '借尸还魂': {
                    const myDead = deadPieces[color];
                    if (!targetPiece || targetPiece.color !== color || (targetPiece.type !== 'yin' && targetPiece.type !== 'yang')) {
                        if (!remotePayload) alert('「借尸还魂」：请点击己方阴阳棋子作为献祭！');
                        break;
                    }
                    if (myDead.length === 0) { if (!remotePayload) alert('「借尸还魂」：没有可复活的五行棋子！'); break; }
                    let reviveIdx;
                    if (remotePayload && remotePayload.reviveIdx !== undefined) {
                        reviveIdx = remotePayload.reviveIdx;
                    } else {
                        const opts = myDead.map((d, i) => ({ ...d, id: `dead_${i}`, name: `${d.symbol}(${d.type})` }));
                        const sel = await openCardSelectModal('借尸还魂：选择复活目标', '请从已死亡的五行棋子中选 1 枚复活', opts, 1, false);
                        if (sel && sel.length > 0) reviveIdx = sel[0];
                    }
                    if (reviveIdx !== undefined) {
                        const revived = myDead[reviveIdx];
                        playerVitality[color] -= revived.originalEnergy; // 额外气血代价
                        updateVitalityDisplay();
                        // 献祭阴阳棋
                        grid[targetPos.r][targetPos.c] = null;
                        // 在原位置复活
                        const revivedPiece = { type: revived.type, color, symbol: revived.symbol, isRevealed: true, justRevived: true };
                        grid[targetPos.r][targetPos.c] = revivedPiece;
                        myDead.splice(reviveIdx, 1);
                        return { reviveIdx };
                    }
                    break;
                }
                case '破釜沉舟': {
                    // 该卡已放入 field（dur=turn），在 useSelectedCard 中检测它实现免费效果
                    // 标记 field 卡：当前玩家的 破釜沉舟 卡已在 field，useSelectedCard 会检查
                    alert('「破釜沉舟」：本回合所有卡牌免费发动，但欠款将在下回合强制结算！风险极高！');
                    break;
                }
                case '噤若寒蝉': {
                    actionBlockedThisTurn = true; // 我方本回合无法行棋
                    // 找到刚推入 field 的卡，设置 turnsLeft=2 使其跨越当前回合及对手整个回合
                    const jrcCard = cardState[color].field.find(c => c.id === '噤若寒蝉');
                    if (jrcCard) jrcCard.turnsLeft = 2; // 确保跨越 1. 我方当前余下时间 2. 对方整个回合
                    alert('「噤若寒蝉」：你放弃本回合行棋，换取接下来的敌方回合内绝对禁卡！');
                    break;
                }
                case '玉石俱焚': {
                    // 反制卡：触发连锁时的事件记录在 counterWindowEvent
                    const ev = counterWindowEvent;
                    if (!ev && !remotePayload) {
                        playerVitality[color] += card.cost; updateVitalityDisplay();
                        const gi = cardState[color].graveyard.lastIndexOf(card);
                        if (gi !== -1) cardState[color].graveyard.splice(gi, 1);
                        cardState[color].hand.push(card);
                        alert('「玉石俱焚」触发失败：未检测到吃子事件上下文！'); return null;
                    }
                    if (ev && ev.attackerPos) {
                        const { r: ar, c: ac } = ev.attackerPos;
                        if (grid[ar] && grid[ar][ac] && grid[ar][ac].color === opp) {
                            deadPieces[opp].push({ type: grid[ar][ac].type, symbol: grid[ar][ac].symbol, originalEnergy: initialEnergyMap[grid[ar][ac].type] });
                            grid[ar][ac] = null;
                            alert('「玉石俱焚」：同归于尽！敌方攻击棋子也已坠入墓地！');
                            renderBoard();
                        }
                    }
                    break;
                }
                case '偷天换日': {
                    // 触发条件：敌方本回合吃掉棋子（在 waitForCounterResponse 已过滤）
                    let pos1, pos2;
                    if (remotePayload && remotePayload.swap1 && remotePayload.swap2) {
                        pos1 = remotePayload.swap1;
                        pos2 = remotePayload.swap2;
                    } else {
                        document.getElementById('info').textContent = `【偷天换日】请依次点击场上两枚你要互换的【己方棋子】（第1/2枚）`;
                        
                        // 选取第一枚
                        pos1 = await new Promise(resolve => {
                            const handler1 = (e) => {
                                const rect = canvas.getBoundingClientRect();
                                const c = Math.floor((e.clientX - rect.left) / cellSize);
                                const r = Math.floor((e.clientY - rect.top) / cellSize);
                                if (r >= 0 && r < boardSize && c >= 0 && c < boardSize) {
                                    const p = grid[r][c];
                                    if (p && p.color === color) {
                                        canvas.removeEventListener('click', handler1);
                                        // 简单高亮反馈
                                        const ctx = canvas.getContext('2d');
                                        ctx.fillStyle = 'rgba(255, 255, 0, 0.4)';
                                        ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
                                        resolve({ r, c });
                                    } else {
                                        alert('必须选择己方棋子！');
                                    }
                                }
                            };
                            canvas.addEventListener('click', handler1);
                        });

                        document.getElementById('info').textContent = `【偷天换日】请点击第二枚你要互换的【己方棋子】（第2/2枚）`;
                        
                        // 选取第二枚
                        pos2 = await new Promise(resolve => {
                            const handler2 = (e) => {
                                const rect = canvas.getBoundingClientRect();
                                const c = Math.floor((e.clientX - rect.left) / cellSize);
                                const r = Math.floor((e.clientY - rect.top) / cellSize);
                                if (r >= 0 && r < boardSize && c >= 0 && c < boardSize) {
                                    if (r === pos1.r && c === pos1.c) {
                                        alert('不能选择同一个棋子！');
                                        return;
                                    }
                                    const p = grid[r][c];
                                    if (p && p.color === color) {
                                        canvas.removeEventListener('click', handler2);
                                        resolve({ r, c });
                                    } else {
                                        alert('必须选择己方棋子！');
                                    }
                                }
                            };
                            canvas.addEventListener('click', handler2);
                        });
                    }

                    // 交换位置
                    const tmp = grid[pos1.r][pos1.c];
                    grid[pos1.r][pos1.c] = grid[pos2.r][pos2.c];
                    grid[pos2.r][pos2.c] = tmp;
                    
                    alert('「偷天换日」发动成功！两枚棋子已互换位置。');
                    renderBoard();

                    return { swap1: pos1, swap2: pos2 };
                    break;
                }
                case '以柔克刚': {
                    const ev = counterWindowEvent;
                    if (!ev && !remotePayload) {
                        playerVitality[color] += card.cost; updateVitalityDisplay();
                        const gi = cardState[color].graveyard.lastIndexOf(card);
                        if (gi !== -1) cardState[color].graveyard.splice(gi, 1);
                        cardState[color].hand.push(card);
                        alert('「以柔克刚」触发失败：未检测到吃子事件上下文！'); return null;
                    }
                    if (ev) {
                        playerVitality[color] = Math.min(50, playerVitality[color] + ev.diffDamage); // 回复
                        playerVitality[opp] -= ev.diffDamage; // 反弹
                        updateVitalityDisplay();
                        alert(`「以柔克刚」：回复 ${ev.diffDamage} 气，并向对手反弹同等伤害！`);
                    }
                    break;
                }
                case '枯木逢春': {
                    const ev = counterWindowEvent;
                    if (!ev && !remotePayload) {
                        playerVitality[color] += card.cost; updateVitalityDisplay();
                        const gi = cardState[color].graveyard.lastIndexOf(card);
                        if (gi !== -1) cardState[color].graveyard.splice(gi, 1);
                        cardState[color].hand.push(card);
                        alert('「枯木逢春」触发失败：未检测到吃子事件上下文！'); return null;
                    }
                    // permanent 卡留场；后续每次损失时 executeMove 自动加 extraYinYangRights
                    alert('「枯木逢春」永久留场：此后每次被敌方吃掉五行棋，你的下一回合将获得额外抛掷阴阳棋的爆兵权（每次发动仍需支付2气）！');
                    break;
                }
                case '生生不息': {
                    const ev = counterWindowEvent;
                    if (!ev && !remotePayload) {
                        // 0费 不用退气
                        const gi = cardState[color].graveyard.lastIndexOf(card);
                        if (gi !== -1) cardState[color].graveyard.splice(gi, 1);
                        cardState[color].hand.push(card);
                        alert('「生生不息」触发失败：未检测到吃子事件上下文！'); return null;
                    }
                    if (ev) {
                        const myElem = ev.defenderType;
                        const oppElem = ev.attackerType;
                        // 相生判定：我生他 (如 木生火，我是木，他是火)
                        if (GENERATE_RELATION[myElem] === oppElem) {
                            playerVitality[color] = Math.min(50, playerVitality[color] + 2);
                            updateVitalityDisplay();
                            alert(`「生生不息」触发：我方"${getElemName(myElem)}"甘为"${getElemName(oppElem)}"之源，生命反哺，回复2点气血！`);
                        } else {
                            if (!remotePayload) alert(`「生生不息」未触发：敌方"${getElemName(oppElem)}"并非由我方"${getElemName(myElem)}"所生。`);
                        }
                    }
                    break;
                }
                case '遗泽后世': {
                    const ev = counterWindowEvent;
                    if (!ev && !remotePayload) {
                        playerVitality[color] += card.cost; updateVitalityDisplay();
                        const gi = cardState[color].graveyard.lastIndexOf(card);
                        if (gi !== -1) cardState[color].graveyard.splice(gi, 1);
                        cardState[color].hand.push(card);
                        alert('「遗泽后世」触发失败：未检测到吃子事件上下文！'); return null;
                    }
                    if (ev) {
                        const drawnCard = drawCard(color);
                        alert(drawnCard ? `「遗泽后世」触发：我方棋子阵亡遗留福祉，你立刻抽取了 1 张手牌！` : `「遗泽后世」触发：但你的牌库已经空了，无法抽牌！`);
                        renderCardZones();
                    }
                    break;
                }
                case '颠倒乾坤': {
                    if (!targetPiece || targetPiece.color !== color || (targetPiece.type !== 'yin' && targetPiece.type !== 'yang')) {
                        if (!remotePayload) alert('「颠倒乾坤」：请选择己方阴阳棋子！'); break;
                    }
                    targetPiece.yinYangCanKill = true;
                    // 设置持续时长，确保覆盖对手回合
                    const cardInField = cardState[color].field.find(c => c.id === '颠倒乾坤' && c.targetRef === `${targetPos.r},${targetPos.c}`);
                    if (cardInField) cardInField.turnsLeft = 2;
                    return null;
                }
                case '此消彼长': {
                    if (!targetPiece || (targetPiece.type !== 'yin' && targetPiece.type !== 'yang')) {
                        if (!remotePayload) alert('「此消彼长」：请选择一枚阴阳棋子！'); break;
                    }
                    let mode;
                    if (remotePayload) {
                        mode = remotePayload.mode;
                    } else {
                        mode = confirm('「此消彼长」\n确定(OK)→己方调和（+1内气/+1场效）\n取消(Cancel)→敌方压制（-1内气/场效归零）')
                            ? (targetPiece.color === color ? 'buff' : null)
                            : (targetPiece.color === opp ? 'debuff' : null);
                        if (!mode) {
                            mode = targetPiece.color === color ? 'buff' : 'debuff';
                        }
                    }
                    if (mode === 'buff' && targetPiece.color === color) {
                        targetPiece.yinYangMod = 1; targetPiece.yinYangFieldMult = 2;
                    } else if (mode === 'debuff' && targetPiece.color === opp) {
                        targetPiece.yinYangMod = -1; targetPiece.yinYangFieldMult = 0;
                    }
                    // 设置持续时长
                    const cardInField = cardState[color].field.find(c => c.id === '此消彼长' && c.targetRef === `${targetPos.r},${targetPos.c}`);
                    if (cardInField) cardInField.turnsLeft = 2;
                    return { mode };
                }
                case '画地为牢': {
                    if (!targetPiece || targetPiece.color !== opp || !targetPiece.isRevealed ||
                        targetPiece.type === 'yin' || targetPiece.type === 'yang') {
                        if (!remotePayload) alert('「画地为牢」：请选择敌方已揭开的五行棋子！'); break;
                    }
                    targetPiece.frozen = true;
                    // 设置持续时长
                    const cardInField = cardState[color].field.find(c => c.id === '画地为牢' && c.targetRef === `${targetPos.r},${targetPos.c}`);
                    if (cardInField) cardInField.turnsLeft = 2;
                    return null;
                }
                case '偷梁换柱': {
                    if (!targetPiece || !targetPiece.isRevealed || targetPiece.type === 'yin' || targetPiece.type === 'yang') {
                        if (!remotePayload) alert('「偷梁换柱」：请选择已揭开的五行棋子！'); break;
                    }
                    const allElems = ['metal', 'wood', 'water', 'fire', 'earth'];
                    const others = allElems.filter(e => e !== (targetPiece.tempElement || targetPiece.type));
                    let newElem;
                    if (remotePayload) {
                        newElem = remotePayload.newElem;
                    } else {
                        const elemMap = { metal: '金', wood: '木', water: '水', fire: '火', earth: '土' };
                        const chosen = prompt(`「偷梁换柱」：为"${targetPiece.symbol}"棋附加临时属性\n可选：${others.map(e => elemMap[e]).join('/')}`);
                        const rev = Object.entries(elemMap).find(([k, v]) => v === chosen);
                        if (rev && others.includes(rev[0])) newElem = rev[0];
                        else { alert('输入无效或该属性已是当前属性。'); break; }
                    }
                    targetPiece.tempElement = newElem;
                    return { newElem };
                }
                case '聚散浮沉': {
                    if (!targetPiece || !targetPiece.isRevealed || targetPiece.type === 'yin' || targetPiece.type === 'yang') {
                        if (!remotePayload) alert('「聚散浮沉」：请选择已揭开的五行棋子！'); break;
                    }
                    let jsMode;
                    if (remotePayload) {
                        jsMode = remotePayload.jsMode;
                    } else {
                        jsMode = targetPiece.color === color ? 'buff' : 'debuff';
                        const confirm2 = confirm(targetPiece.color === color
                            ? '「聚散浮沉」：聚（己方强化，+2基础内气）？\n确定=聚，取消=散（选择敌方来用散）'
                            : '「聚散浮沉」：散（敌方削弱，-2基础内气）？确定=散');
                        if (!confirm2) break;
                    }
                    targetPiece.tempEnergyMod = (jsMode === 'buff') ? 2 : -2;
                    // 设置持续时长
                    const cardInField = cardState[color].field.find(c => c.id === '聚散浮沉' && c.targetRef === `${targetPos.r},${targetPos.c}`);
                    if (cardInField) cardInField.turnsLeft = 2;
                    return { jsMode };
                }
                case '含沙射影': {
                    if (!targetPiece || targetPiece.color !== color) {
                        if (!remotePayload) alert('「含沙射影」：请选择己方任意棋子设置暗记！'); break;
                    }
                    targetPiece.hasTrap = true;
                    if (!remotePayload) alert(`「含沙射影」：暗记已秘密附于棋子，对手不知。当该棋子被吃时陷阱触发！`);
                    return null;
                }
                case '徒劳无功': {
                    // 简化实现：无效化对方上一张打出的卡牌效果（如果还在手牌/墓地栈顶）
                    // 网络对战时可连锁；本地模式简化为：移除对方墓地最后一张卡的效果标记
                    if (!remotePayload) {
                        const oppGrave = cardState[opp].graveyard;
                        if (oppGrave.length > 0) {
                            const negated = oppGrave[oppGrave.length - 1];
                            alert(`「徒劳无功」：「${negated.name}」的效果被无效化（注：完整连锁逻辑需联网实战）。`);
                        } else {
                            alert('「徒劳无功」：对手当前无已使用的卡牌可无效化。');
                        }
                    }
                    break;
                }
                default: break;

            }
            return null;
        }

        function openCardZoom(card) {
            const durLabel = { permanent: '持续：永久', turn: '持续：本回合', instant: '即时发动' };
            const typeLabel = { active: '主动', counter: '反制', instant: '即时' };
            const inner = document.getElementById('card-zoom-inner');
            inner.className = `card-${card.type}`; // 切换颜色主题
            document.getElementById('czoom-cost').textContent = card.cost;
            document.getElementById('czoom-icon').textContent = card.icon;
            document.getElementById('czoom-name').textContent = card.name;
            document.getElementById('czoom-subtype').textContent = typeLabel[card.type] || card.type;
            document.getElementById('czoom-dur').textContent = durLabel[card.dur] || card.dur;
            document.getElementById('czoom-desc').textContent = card.desc;
            document.getElementById('card-zoom-modal').classList.add('open');
        }

        function closeCardZoom() {
            document.getElementById('card-zoom-modal').classList.remove('open');
        }

        function openGraveyardModal(color) {
            const label = color === 'black' ? '黑方' : '白方';
            document.getElementById('grave-modal-title').textContent = `💀 ${label}墓地（全场公开）`;
            
            // 1. 渲染死亡棋子
            const data = deadPieces[color] || { fiveElements: [], yin: 0, yang: 0 };
            const pCont = document.getElementById('grave-modal-pieces');
            const pEmpty = document.getElementById('grave-pieces-empty');
            pCont.innerHTML = '';
            
            const totalYinYang = (data.yin || 0) + (data.yang || 0);
            const hasFiveElements = data.fiveElements && data.fiveElements.length > 0;

            if (!hasFiveElements && totalYinYang === 0) {
                pEmpty.style.display = 'block';
            } else {
                pEmpty.style.display = 'none';
                // 渲染五行棋
                if (hasFiveElements) {
                    data.fiveElements.forEach(p => {
                        const el = document.createElement('div');
                        el.className = `piece dead-piece-item ${color} ${p.type}`;
                        el.textContent = p.symbol;
                        el.title = `${label}${getElemName(p.type)} (初始内气:${p.originalEnergy})`;
                        pCont.appendChild(el);
                    });
                }
                // 渲染阴阳棋计数（合并为一个图标代表）
                if (totalYinYang > 0) {
                    const el = document.createElement('div');
                    el.className = `piece dead-piece-item ${color} yin-yang-representative`;
                    el.textContent = '☯'; 
                    el.title = `${label}阴阳棋 (共计:${totalYinYang}枚)`;
                    
                    const badge = document.createElement('div');
                    badge.style.cssText = 'position:absolute;bottom:-5px;right:-5px;background:#ff4444;color:white;font-size:10px;padding:1px 4px;border-radius:10px;border:1px solid white;line-height:1;';
                    badge.textContent = `*${totalYinYang}`;
                    
                    el.style.position = 'relative';
                    el.appendChild(badge);
                    pCont.appendChild(el);
                }
            }

            // 2. 渲染弃牌堆
            const grave = cardState[color].graveyard;
            const listEl = document.getElementById('grave-modal-list');
            const emptyEl = document.getElementById('grave-modal-empty');
            listEl.innerHTML = '';
            if (grave.length === 0) {
                emptyEl.style.display = 'block';
            } else {
                emptyEl.style.display = 'none';
                const typeLabel = { active: '主动', counter: '反制', instant: '即时' };
                const durLabel = { permanent: '永久', turn: '回合', instant: '即时' };
                grave.forEach(card => {
                    const wrap = document.createElement('div');
                    wrap.style.cssText = 'transform:scale(0.85); transform-origin: top left; width: 68px; height: 110px; margin-right: -10px; margin-bottom: -10px;';
                    
                    const el = document.createElement('div');
                    el.className = `hand-card card-${card.type}`;
                    el.innerHTML = `
                        <div class="hand-card-cost">${card.cost}</div>
                        <div class="hand-card-icon">${card.icon}</div>
                        <div class="hand-card-name" style="font-size:9px;">${card.name}</div>
                    `;
                    el.title = `【${card.name}】\n${card.desc}`;
                    el.onclick = () => openCardZoom(card);
                    wrap.appendChild(el);
                    listEl.appendChild(wrap);
                });
            }
            
            document.getElementById('graveyard-modal').style.display = 'block';
        }

        function getElemName(type) {
            const names = { metal: '金', wood: '木', water: '水', fire: '火', earth: '土' };
            return names[type] || type;
        }


        function initData() {
            if (myRoom && socket) {
                grid = Array(boardSize).fill(null).map(() => Array(boardSize).fill(null));
                playerActionCounts = { black: { reveal: 0, drop: 0 }, white: { reveal: 0, drop: 0 } };
                updateVitalityDisplay(); return;
            }
            grid = Array(boardSize).fill(null).map(() => Array(boardSize).fill(null));
            const shuffle = (a) => { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; };
            const bC = shuffle([0, 1, 2, 3, 4, 5, 6, 7, 8]).slice(0, 5), wC = shuffle([0, 1, 2, 3, 4, 5, 6, 7, 8]).slice(0, 5);
            const tmpl = [{ type: 'metal', s: '金' }, { type: 'wood', s: '木' }, { type: 'water', s: '水' }, { type: 'fire', s: '火' }, { type: 'earth', s: '土' }];
            tmpl.forEach((p, i) => {
                grid[8][bC[i]] = { type: p.type, color: 'black', symbol: p.s, isRevealed: false };
                grid[0][wC[i]] = { type: p.type, color: 'white', symbol: p.s, isRevealed: false };
            });
            updateVitalityDisplay();
            initCardDecks();
        }

        initData();
        renderBoard();
        updateVitalityDisplay();

    </script>
</body>

</html>
