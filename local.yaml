port: 7890
socks-port: 7891
mixed-port: 7897
allow-lan: true
mode: rule
log-level: info
external-controller: :9090
ipv6: false
bind-address: 0.0.0.0

sniffer:
  enable: true
  skip-domain:
    - "imap.gmail.com"
    - "smtp.gmail.com"

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.localhost'
    - 'localhost'
    - localhost.ptlogin2.qq.com
    - '+.docker.internal'
    - '*.sfx.ms'
    - '*.microsoft.com'
    - '*.microsoftonline.com'
    - '*.windows.net'
    - '*.live.com'
    - '*.office.com'
    - '*.office365.com'
    - '*.onedrive.com'
    - '*.sharepoint.com'
    - 'stun.*'
    - 'stun.*.*'
    - 'stun.*.*.*'
    - '+.amazonaws.com'
    - '+.sentry.io'
    - '+.npmmirror.com'
    - '+.taobao.org'
    - '+.anthropic.com'
    - '+.claude.ai'
    - '+.openai.com'
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

